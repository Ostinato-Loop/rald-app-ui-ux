name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: Format, Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Format (auto-fix in CI workspace)
        run: bun run format
      - name: Lint
        run: bun run lint
      - name: Type check
        run: bun run typecheck
      - name: Build
        run: bun run build
        env:
          NODE_ENV: production
