name: CI

  on:
    push:
      branches: ["**"]
    pull_request:
      branches: [main]

  concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

  jobs:
    build:
      name: Lint & Build
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - uses: oven-sh/setup-bun@v2
          with:
            bun-version: latest

        - name: Install dependencies
          run: bun install --frozen-lockfile

        - name: Lint
          run: bun run lint
          continue-on-error: false

        - name: Build
          run: bun run build
          env:
            NODE_ENV: production

        - name: Verify build output
          run: |
            if [ ! -d ".output" ] && [ ! -d "dist" ] && [ ! -d ".nitro" ]; then
              ls -la
              echo "WARNING: No known build output directory found — check build config."
            else
              echo "Build output present ✓"
            fi
  